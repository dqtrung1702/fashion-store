services:
  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - fashion_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fashion_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fashion_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      DATABASE_NAME: ${DATABASE_NAME}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_SEED_ENABLED: ${ADMIN_SEED_ENABLED:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fashionstore.com}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Store Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-fashion-store-assets}
      MINIO_SECURE: "false"
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-true}
      REDIS_URL: redis://redis:6379/0
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      REDIS_RETRY_SECONDS: ${REDIS_RETRY_SECONDS:-30}
    depends_on:
      - mongodb
      - minio
      - redis
    networks:
      - fashion_network
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-2}

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - minio
    networks:
      - fashion_network

volumes:
  mongodb_data:
  minio_data:
  redis_data:

networks:
  fashion_network:
    driver: bridge
